npc_combined:
  # Section types to mark as ignored (stored but not summarized)
  skip_section_types:
  - minutes
  - notice
  # Combined PDF selection priority (first found wins)
  pdf_priority:
  - composite
  - supplemental
  - initial

agenda_parsing:
  mode: llm_verify
  parse_model: claude-haiku-4-5-20251001
  match_model: claude-haiku-4-5-20251001
  escalation_model: claude-sonnet-4-6

summarization:
  models:
    document: claude-sonnet-4-6
    rollup: claude-haiku-4-5
    briefing: claude-opus-4-5
  max_input_chars: 180000
  chunk_chars: 60000
  max_response_tokens: 4096
  skip_extensions:
  - .ics
  - .zip
  - .xlsx
  - .csv
  - .txt
  skip_filename_patterns:
  - _actions_letter
  - _meeting_minutes
  - _motions_letter
  - _minutes_
  - _minutes.
  images:
    enabled: true
    min_size_px: 200
    max_per_item: 8
    extract_from:
    - .pdf
    - .pptx
  doc_prompt_path: prompts/doc_summary_prompt.md
  agenda_item_prompt_path: prompts/agenda_item_prompt.md
  briefing_prompt_path: prompts/isone_mc_briefing_prompt.md
